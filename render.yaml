services:
  - type: web
    name: ab-monitor-api
    env: python
    rootDir: backend
    buildCommand: pip install -r ../requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /status
    envVars:
      # Leave blank to keep /event open, or set a long random secret to require
      # the X-API-Key header. Render will prompt for this during Blueprint setup.
      - key: INGEST_API_KEY
        sync: false
